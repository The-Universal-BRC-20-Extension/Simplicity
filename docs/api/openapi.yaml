  /v1/indexer/swap/pools/{pool_id}/reserves:
    get:
      summary: Réserves d'un pool de swap
      description: |
        Récupère les réserves exactes d'un pool de swap calculées depuis les positions actives.
        
        Les réserves sont calculées dynamiquement :
        - reserve_a = SUM(amount_locked WHERE pool_id=X AND src_ticker=token_a AND status='active')
        - reserve_b = SUM(amount_locked WHERE pool_id=X AND src_ticker=token_b AND status='active')
        
        Ces réserves sont utilisées pour le calcul AMM (constant product) lors des swaps.
      operationId: getPoolReserves
      tags:
        - Swap
      parameters:
        - name: pool_id
          in: path
          required: true
          description: "ID canonique du pool (trié alphabétiquement, ex: 'LOL-WTF' et non 'WTF-LOL')"
          schema:
            type: string
          example: "LOL-WTF"
      responses:
        '200':
          description: Réserves du pool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolReservesResponse'
        '404':
          description: Pool non trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Pool LOL-WTF not found"
        '500':
          description: Erreur interne du serveur

  /v1/indexer/swap/quote:
    get:
      summary: Estimation de swap (quote)
      description: |
        Calcule le montant exact de tokens DST attendu pour un swap donné, sans l'exécuter.
        
        Cet endpoint simule un swap sans l'exécuter, permettant au frontend de :
        - Afficher le montant exact de tokens DST attendu
        - Montrer l'impact du slippage
        - Afficher le price impact (impact sur le prix du pool)
        - Valider si le swap est réalisable avant de générer le JSON OP_RETURN
        - Afficher si le swap sera partiellement rempli (partial fill)
      operationId: getSwapQuote
      tags:
        - Swap
      parameters:
        - name: src
          in: query
          required: true
          description: Ticker du token source (celui qu'on swap)
          schema:
            type: string
          example: "LOL"
        - name: dst
          in: query
          required: true
          description: Ticker du token destination (celui qu'on reçoit)
          schema:
            type: string
          example: "WTF"
        - name: amount
          in: query
          required: true
          description: Montant de tokens source à swapper (format décimal)
          schema:
            type: string
          example: "100.5"
        - name: slippage
          in: query
          required: true
          description: Tolérance au slippage (0-100, ex: "1" pour 1%)
          schema:
            type: string
          example: "1"
      responses:
        '200':
          description: Estimation de swap avec tous les détails de calcul
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapQuoteResponse'
        '400':
          description: Requête invalide (tickers identiques, montant invalide, slippage hors limites, liquidité insuffisante)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Amount must be positive"
        '404':
          description: Pool non trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Pool LOL-WTF not found. Make sure both LOL and WTF have active positions."
        '500':
          description: Erreur interne du serveur

  /v1/indexer/swap/pools/{pool_id}/transactions:
    get:
      summary: Transactions récentes d'un pool (agrégées)
      description: |
        Retourne les transactions récentes d'un pool, agrégées par txid pour l'affichage.
        
        Focus sur les données récentes (20-100 dernières transactions) avec pagination.
        Le volume et les fees sont séparés par ticker (token_a et token_b).
      operationId: getPoolTransactions
      tags:
        - Swap
      parameters:
        - name: pool_id
          in: path
          required: true
          description: "ID canonique du pool (trié alphabétiquement, ex: 'LOL-WTF')"
          schema:
            type: string
          example: "LOL-WTF"
        - name: operation_type
          in: query
          description: Filtrer par type d'opération
          schema:
            type: string
            enum: [swap_init, swap_exe, unlock]
            nullable: true
          example: "swap_exe"
        - name: limit
          in: query
          description: Nombre de transactions à retourner
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          description: Décalage pour la pagination
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: Liste des transactions agrégées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolTransactionsResponse'
        '400':
          description: Pool ID invalide
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Invalid pool_id format: LOL-WTF"
        '404':
