      operationId: getAllAddressTickerHistory
      parameters:
        - name: address
          in: path
          required: true
          description: Adresse Bitcoin
          schema:
            type: string
        - name: ticker
          in: path
          required: true
          description: BRC-20 token symbol
          schema:
            type: string
        - name: op_type
          in: query
          description: "Filtrer par type d'opération"
          schema:
            type: string
            nullable: true
        - name: max_results
          in: query
          description: Nombre maximum de résultats à retourner
          schema:
            type: integer
            minimum: 1
            nullable: true
        - name: include_invalid
          in: query
          description: Inclure les opérations invalides
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Historique complet pour l'adresse et le ticker
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/GetAllResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Op'
        '500':
          description: Erreur interne du serveur

